name: Build Like2D Multi-Platform

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake \
          libwayland-dev libx11-dev libxcursor-dev libxext-dev libxinerama-dev \
          libxrender-dev libxrandr-dev libxi-dev libxss-dev libxkbcommon-dev \
          libasound2-dev libpulse-dev libaudio-dev libjack-dev libsndio-dev \
          libusb-1.0-0-dev libdbus-1-internal-dev libibus-1.0-dev \
          libunwind-dev libdrm-dev libgbm-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release --target Like2D

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Like2D-Linux-Runner
        path: build/bin/

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release --target Like2D

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Like2D-Windows-Runner
        path: build/bin/
